<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - OpenBook</title>
    <link rel="icon" type="image/x-icon" href="https://static.photos/minimal/32x32/1">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            300: '#6ee7b7',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                        },
                        secondary: {
                            50: '#fdf4ff',
                            100: '#fae8ff',
                            200: '#f5d0fe',
                            300: '#f0abfc',
                            400: '#e879f9',
                            500: '#d946ef',
                            600: '#c026d3',
                            700: '#a21caf',
                            800: '#86198f',
                            900: '#701a75',
                        },
                        slate: {
                            850: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors duration-200">
    <sherpa-navbar></sherpa-navbar>
    
    <div class="min-h-screen bg-slate-50 dark:bg-slate-900 py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-7xl mx-auto">
            <!-- Breadcrumb -->
            <nav class="flex items-center gap-2 text-sm text-slate-500 mb-8">
                <a href="/" class="hover:text-primary-600 dark:hover:text-primary-400">Home</a>
                <i data-feather="chevron-right" class="w-4 h-4"></i>
                <a href="/schools.html" class="hover:text-primary-600 dark:hover:text-primary-400">Schools</a>
                <i data-feather="chevron-right" class="w-4 h-4"></i>
                <span id="school-name" class="text-slate-800 dark:text-slate-200 font-medium">Loading...</span>
            </nav>
            
            <!-- Header -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 id="school-title" class="text-3xl font-bold mb-2">Loading...</h1>
                    <p id="courses-count" class="text-slate-600 dark:text-slate-400">Loading courses...</p>
                </div>
                <div class="flex gap-2">
                    <div class="relative">
                        <i data-feather="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input
                            type="text"
                            id="course-search"
                            placeholder="Filter courses..."
                            class="pl-10 pr-4 py-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:border-primary-500 dark:focus:border-primary-500 outline-none w-64"
                        >
                    </div>
                    <select id="dept-filter" class="px-4 py-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none">
                        <option value="">All Departments</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Physics">Physics</option>
                        <option value="Economics">Economics</option>
                        <option value="EECS">EECS</option>
                    </select>
                </div>
            </div>
            
            <!-- Courses Grid -->
            <div id="courses-grid" class="grid lg:grid-cols-2 gap-6">
                <!-- Courses will be populated by JavaScript -->
            </div>
            
            <!-- Empty State -->
            <div id="empty-state" class="hidden text-center py-16">
                <i data-feather="book-open" class="w-16 h-16 mx-auto mb-4 text-slate-300 dark:text-slate-600"></i>
                <h3 class="text-xl font-semibold mb-2">No courses found</h3>
                <p class="text-slate-500">Try adjusting your search or filters</p>
            </div>
        </div>
    </div>

    <sherpa-footer></sherpa-footer>
    
    <!-- Back to Home Floating Button -->
    <a href="/" class="fixed bottom-24 right-6 z-50 w-14 h-14 rounded-full bg-primary-500 hover:bg-primary-600 text-white shadow-lg hover:shadow-xl transition-all flex items-center justify-center group" title="Back to Home">
        <i data-feather="home" class="w-6 h-6 group-hover:scale-110 transition-transform ml-0.5"></i>
    </a>

    <!-- Components -->
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="components/school-request-modal.js"></script>
    <script src="script.js"></script>

    <script type="module">
        import { getSchoolById, schoolsData } from './components/schools-data.js';
        import { coursesData, getCoursesByAbbr } from './components/courses.js';

        let currentSchool = null;
        let allCourses = [];

        function getSchoolFromUrlOrStorage() {
            const params = new URLSearchParams(window.location.search);
            const schoolParam = params.get('school');

            // Try to find school by abbreviation first (e.g., ?school=MIT)
            if (schoolParam) {
                const schoolByAbbr = schoolsData.find(s => s.abbr === schoolParam);
                if (schoolByAbbr) {
                    localStorage.setItem('selectedSchool', JSON.stringify(schoolByAbbr));
                    return schoolByAbbr;
                }
                
                // Fallback: try by ID (e.g., ?school=mit)
                const schoolById = getSchoolById(schoolParam);
                if (schoolById) {
                    localStorage.setItem('selectedSchool', JSON.stringify(schoolById));
                    return schoolById;
                }
            }

            // Fallback to localStorage
            const stored = localStorage.getItem('selectedSchool');
            if (stored) {
                try {
                    const parsedStoredSchool = JSON.parse(stored);
                    if (parsedStoredSchool?.id) {
                        const matchedSchool = getSchoolById(parsedStoredSchool.id);
                        if (matchedSchool) {
                            localStorage.setItem('selectedSchool', JSON.stringify(matchedSchool));
                            return matchedSchool;
                        }
                    }
                } catch (error) {
                    console.error('Failed to parse stored school:', error);
                    localStorage.removeItem('selectedSchool');
                }
            }

            return null;
        }

        function loadSchool() {
            currentSchool = getSchoolFromUrlOrStorage();

            if (currentSchool) {
                document.getElementById('school-name').textContent = currentSchool.abbr;
                document.getElementById('school-title').textContent = currentSchool.name;
                
                // Update URL to show abbreviation if not already set
                const params = new URLSearchParams(window.location.search);
                if (params.get('school') !== currentSchool.abbr) {
                    const newUrl = `${window.location.pathname}?school=${encodeURIComponent(currentSchool.abbr)}`;
                    window.history.replaceState({}, '', newUrl);
                }
                
                loadCourses();
            } else {
                window.location.href = '/schools.html';
            }
        }

        function loadCourses() {
            if (currentSchool) {
                // Filter courses by school abbreviation from the dedicated courses dataset
                allCourses = getCoursesByAbbr(currentSchool.abbr);
                renderCourses(allCourses);
            } else {
                allCourses = [];
                renderCourses([]);
            }
        }

        function renderCourses(coursesToRender) {
            const grid = document.getElementById('courses-grid');
            const emptyState = document.getElementById('empty-state');
            const countEl = document.getElementById('courses-count');

            countEl.textContent = `${coursesToRender.length} courses available`;

            if (coursesToRender.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');

                if (window.feather && typeof window.feather.replace === 'function') {
                    window.feather.replace();
                }
                return;
            }

            emptyState.classList.add('hidden');

            grid.innerHTML = coursesToRender.map((course, i) => `
                <div
                    class="course-card group p-6 rounded-2xl bg-white dark:bg-slate-800 shadow-lg cursor-pointer transition-all hover:shadow-xl hover:-translate-y-1 border-l-4 border-primary-500"
                    style="animation: staggerFadeIn 0.5s ease forwards; animation-delay: ${i * 100}ms; opacity: 0;"
                >
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <span class="px-2 py-1 rounded-lg bg-primary-100 dark:bg-primary-900/30 text-primary-700 dark:text-primary-300 text-sm font-semibold">${course.code}</span>
                                <span class="px-2 py-1 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-400 text-sm">${course.credits} credits</span>
                            </div>
                            <h3 class="text-xl font-bold group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors">${course.name}</h3>
                        </div>
                        <i data-feather="arrow-right" class="w-5 h-5 text-slate-400 group-hover:text-primary-500 transition-colors"></i>
                    </div>
                    <p class="text-slate-600 dark:text-slate-400 text-sm mb-4">${course.department}</p>
                    <div class="flex items-center gap-6 text-sm text-slate-500">
                        <span class="flex items-center gap-1">
                            <i data-feather="book" class="w-4 h-4"></i>
                            ${typeof mockData !== 'undefined' ? mockData.textbooks.filter(t => t.courseId === course.id).length : 0} textbooks
                        </span>
                        <span class="flex items-center gap-1">
                            <i data-feather="users" class="w-4 h-4"></i>
                            ${typeof mockData !== 'undefined' ? mockData.sections.filter(s => s.courseId === course.id).reduce((a, s) => a + s.seats, 0) : 0} students
                        </span>
                    </div>
                </div>
            `).join('');

            if (window.feather && typeof window.feather.replace === 'function') {
                window.feather.replace();
            }
        }

        function filterCourses() {
            const searchTerm = document.getElementById('course-search').value.toLowerCase();
            const deptFilter = document.getElementById('dept-filter').value;

            const filtered = allCourses.filter(course => {
                const matchesSearch =
                    course.name.toLowerCase().includes(searchTerm) ||
                    course.code.toLowerCase().includes(searchTerm);

                const matchesDept = !deptFilter || course.department === deptFilter;

                return matchesSearch && matchesDept;
            });

            renderCourses(filtered);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadSchool();

            document.getElementById('course-search').addEventListener('input', filterCourses);
            document.getElementById('dept-filter').addEventListener('change', filterCourses);

            if (window.feather && typeof window.feather.replace === 'function') {
                window.feather.replace();
            }
        });
    </script>
</body>
</html>
